name: Sync InfoJobs → RadarISP

on:
  schedule:
    # 10:00 e 15:00 horário de Brasília (UTC-3)
    - cron: "0 13 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore logo cache
        uses: actions/cache@v4
        with:
          path: logo_cache.json
          key: infojobs-logo-cache-${{ github.run_id }}
          restore-keys: |
            infojobs-logo-cache-

      - name: Sync InfoJobs
        env:
          RADARISP_WP_URL: https://radarisp.com.br
          RADARISP_SYNC_KEY: ${{ secrets.RADARISP_SYNC_KEY }}
          INFOJOBS_MAX_PAGES: "20"
          INFOJOBS_LOGO_FETCH_LIMIT: "200"
        run: python sync_infojobs.py

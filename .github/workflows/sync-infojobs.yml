name: Sync InfoJobs → RadarISP

on:
  schedule:
    # Todos os dias às 06:00 UTC (03:00 horário de Brasília)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync InfoJobs
        env:
          RADARISP_WP_URL: https://radarisp.com.br
          RADARISP_SYNC_KEY: ${{ secrets.RADARISP_SYNC_KEY }}
          INFOJOBS_MAX_PAGES: "20"
        run: python sync_infojobs.py
